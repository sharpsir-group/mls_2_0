# Apache VirtualHost for mls.sharpsir.group -> RESO Web API (port 3900)
# Install: sudo cp scripts/mls-vhost.conf /opt/bitnami/apache/conf/vhosts/mls-sharpsir.conf

# HTTP -> HTTPS redirect
<VirtualHost *:80>
    ServerName mls.sharpsir.group
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# HTTPS with reverse proxy to uvicorn API
<VirtualHost *:443>
    ServerName mls.sharpsir.group

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/mls.sharpsir.group/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/mls.sharpsir.group/privkey.pem

    # Proxy to uvicorn (HTTPS on port 3900)
    SSLProxyEngine on
    SSLProxyVerify none
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off

    ProxyPreserveHost On
    ProxyPass / https://127.0.0.1:3900/
    ProxyPassReverse / https://127.0.0.1:3900/

    # Headers
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ErrorLog /opt/bitnami/apache/logs/mls-error.log
    CustomLog /opt/bitnami/apache/logs/mls-access.log combined
</VirtualHost>
